<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Chongqing Hikes</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-page { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 2rem; background: #1a1a1a; color: #fff; }
        .error-code { font-size: 8rem; color: #c9a961; font-weight: 700; line-height: 1; }
        .error-title { font-size: 2rem; margin: 1rem 0; }
        .error-desc { color: rgba(255,255,255,0.7); margin-bottom: 2rem; }
        .error-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
        .btn-error { padding: 12px 30px; border-radius: 4px; text-decoration: none; font-weight: 600; }
        .btn-error-primary { background: #c9a961; color: #1a1a1a; }
        .btn-error-secondary { border: 1px solid rgba(255,255,255,0.3); color: #fff; }
    </style>
</head>
<body>
    <div class="scroll-progress"></div>
    <div class="error-page">
        <div style="font-size: 4rem; margin-bottom: 1rem;">🏔️</div>
        <div class="error-code">404</div>
        <h1 class="error-title">Lost in the 8D City</h1>
        <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>
        <div class="error-actions">
            <a href="index.html" class="btn-error btn-error-primary">Back to Home</a>
            <a href="city-tours.html" class="btn-error btn-error-secondary">Explore Tours</a>
            <a href="contact.html" class="btn-error btn-error-secondary">Contact Ryan</a>
        </div>
    </div>
</body>
</html>
